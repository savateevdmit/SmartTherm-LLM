services:
  redis:
    image: redis:7-alpine
    container_name: smarttherm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  db:
    image: mariadb:11.8
    container_name: smarttherm-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_PASSWORD}"
      MARIADB_DATABASE: "${DB_NAME}"
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:18307:3306"

  db_restore:
    image: mariadb:11.8
    container_name: smarttherm-db-restore
    depends_on:
      - db
    restart: "no"
    environment:
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_USER: "root"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      BACKUP_DIR: "/backups"
      RESTORE_FORCE: "${RESTORE_FORCE}"
    volumes:
      - ./backups:/backups
      - ./ops/db_restore.sh:/db_restore.sh:ro
    entrypoint: ["bash", "/db_restore.sh"]

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: smarttherm-llama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    env_file:
      - .env
    volumes:
      - ./models:/models:ro
    command: >
      --host 0.0.0.0
      --port 8080
      --model ${LLM_MODEL_PATH}
      --n-gpu-layers ${LLM_N_GPU_LAYERS}
      --ctx-size ${LLM_N_CTX}
      --seed ${LLM_SEED}
    ports:
      - "127.0.0.1:18080:8080"

  minio:
    image: minio/minio:latest
    container_name: smarttherm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY}"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:19001:9001"

  minio_init:
    image: minio/mc:latest
    container_name: smarttherm-minio-init
    depends_on:
      - minio
    restart: "no"
    environment:
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
    entrypoint: >
      /bin/sh -lc "
      mc alias set local ${S3_ENDPOINT_URL} ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY} &&
      mc mb -p local/${S3_BUCKET} || true
      "

  webkb:
    build: .
    container_name: smarttherm-webkb
    restart: unless-stopped
    runtime: nvidia
    env_file:
      - .env
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

      VPS_PROXY: "${VPS_PROXY}"

      DB_HOST: "db"
      DB_PORT: "3306"
      DB_USER: "root"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"

      APP_SECRET_KEY: "${APP_SECRET_KEY}"
      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME}"
      COOKIE_SECURE: "${COOKIE_SECURE}"
      ROOT_PATH: "${ROOT_PATH}"

      HF_TOKEN: "${HF_TOKEN}"
      EMBED_MODEL_ID: "${EMBED_MODEL_ID}"
      EMBED_DEVICE: "${EMBED_DEVICE}"
      EMBED_TRUNCATE_DIM: "${EMBED_TRUNCATE_DIM}"

      MEDIA_DIR: "${MEDIA_DIR}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB}"

      SESSIONS_DB_PATH: "${SESSIONS_DB_PATH}"
      LOG_PATH: "${LOG_PATH}"

      REDIS_URL: "${REDIS_URL}"
      QUEUE_NAME: "${QUEUE_NAME}"

      TG_BOT_TOKEN: "${TG_BOT_TOKEN}"
      TG_LOG_CHANNEL_ID: "${TG_LOG_CHANNEL_ID}"
      TG_LOG_ENABLED: "${TG_LOG_ENABLED}"

      MEDIA_STORAGE: "s3"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL}"
      S3_REGION: "${S3_REGION}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      S3_PREFIX: "${S3_PREFIX}"

    volumes:
      - ./data:/app/data
    ports:
      - "0.0.0.0:18052:8052"
    depends_on:
      - redis
      - db
      - db_restore
      - minio

  worker:
    build: .
    container_name: smarttherm-worker
    restart: unless-stopped
    runtime: nvidia
    env_file:
      - .env
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

      VPS_PROXY: "${VPS_PROXY}"

      DB_HOST: "db"
      DB_PORT: "3306"
      DB_USER: "root"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"

      HF_TOKEN: "${HF_TOKEN}"
      EMBED_MODEL_ID: "${EMBED_MODEL_ID}"
      EMBED_DEVICE: "cuda"
      EMBED_TRUNCATE_DIM: "${EMBED_TRUNCATE_DIM}"

      MEDIA_DIR: "${MEDIA_DIR}"

      REDIS_URL: "${REDIS_URL}"
      QUEUE_NAME: "${QUEUE_NAME}"

      LLM_SERVER_URL: "http://llama:8080"

      RAG_TOP_K: "${RAG_TOP_K}"
      RAG_RELEVANCE_THRESHOLD: "${RAG_RELEVANCE_THRESHOLD}"

      TG_BOT_TOKEN: "${TG_BOT_TOKEN}"
      TG_LOG_CHANNEL_ID: "${TG_LOG_CHANNEL_ID}"
      TG_LOG_ENABLED: "${TG_LOG_ENABLED}"

      LOG_PATH: "${LOG_PATH}"

    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - db
      - db_restore
      - llama
    command: ["bash", "-lc", "python -m app.worker.run_worker"]

  tg_bot:
    build: .
    env_file:
      - .env
    container_name: smarttherm-tg-bot
    restart: unless-stopped
    environment:
      REDIS_URL: "${REDIS_URL}"
      VPS_PROXY: "${VPS_PROXY}"
      QUEUE_NAME: "${QUEUE_NAME}"
      TG_BOT_TOKEN: "${TG_BOT_TOKEN}"
      ROOT_PATH: "${ROOT_PATH}"
      WEBKB_PUBLIC_BASE_URL: "${WEBKB_PUBLIC_BASE_URL}"
      WEBKB_INTERNAL_BASE_URL: "http://webkb:8052"
    depends_on:
      - redis
      - webkb
    command: ["bash", "-lc", "python -m bot.main"]

  db_backup:
    image: mariadb:11.8
    container_name: smarttherm-db-backup
    restart: unless-stopped
    environment:
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_USER: "root"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      BACKUP_INTERVAL_HOURS: "${BACKUP_INTERVAL_HOURS}"
      BACKUP_KEEP_DAYS: "${BACKUP_KEEP_DAYS}"
      BACKUP_DIR: "/backups"
    volumes:
      - ./backups:/backups
      - ./ops/db_backup.sh:/db_backup.sh:ro
    depends_on:
      - db
    entrypoint: ["bash", "/db_backup.sh"]

volumes:
  redis_data:
  minio_data:
  mariadb_data: