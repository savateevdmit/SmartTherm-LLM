{% extends "base.html" %}
{% block title %}Добавить запись — SmartTherm — База знаний{% endblock %}

{% block content %}
<div class="card p-4">
  <div class="mb-3">
    <div class="text-muted small">SmartTherm</div>
    <h1 class="h4 mb-0">Добавить запись в базу знаний</h1>
  </div>

  <form id="question-new-form" enctype="multipart/form-data" class="d-grid gap-3" novalidate>
    <input type="hidden" name="csrf" value="{{ sess.csrf }}"/>

    <div>
      <label class="form-label">Вопрос (обязательно, до 500 символов)</label>
      <textarea name="text" id="field-text" class="form-control" rows="3" maxlength="500" required>{{ text or "" }}</textarea>
    </div>

    <div>
      <label class="form-label">Ответ (обязательно, до 2000 символов)</label>
      <textarea name="answer_text" class="form-control" rows="5" maxlength="2000" required>{{ answer_text or "" }}</textarea>
    </div>

    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label">Теги (необязательно)</label>
        <input name="tags" class="form-control" maxlength="255" value="{{ tags or "" }}"/>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Изображения (необязательно)</label>
        <input type="file" name="files" multiple class="form-control" accept="image/png,image/jpeg"/>
        <div class="text-muted small mt-1">Разрешены PNG/JPG. Все файлы будут сохранены как JPG. Лимит по весу: {{ app_settings.max_upload_mb }} МБ.</div>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" id="submit-btn">Создать</button>
      <a class="btn btn-outline-secondary" href="{{ url('/questions') }}">Отмена</a>
    </div>
  </form>
</div>

<div id="toast-stack" aria-live="polite" aria-atomic="false"></div>

<style>
#toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1090;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  pointer-events: none;
}

.st-toast {
  width: 340px;
  background: #fff;
  border: 1px solid rgba(0,0,0,.12);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.14);
  padding: 13px 15px 10px;
  pointer-events: all;
  cursor: default;
  transition: transform 0.28s ease, opacity 0.28s ease, margin-top 0.28s ease;
  opacity: 1;
  transform: translateY(0) scale(1);
  margin-top: -56px;
}

.st-toast:first-child {
  margin-top: 0;
}

#toast-stack:hover .st-toast {
  margin-top: 8px;
}
#toast-stack:hover .st-toast:first-child {
  margin-top: 0;
}

.st-toast.st-entering {
  opacity: 0;
  transform: translateY(32px) scale(0.94);
}

.st-toast.st-leaving {
  opacity: 0;
  transform: translateX(64px) scale(0.94);
  pointer-events: none;
}

.st-toast.st-pending { border-left: 4px solid #0d6efd; }
.st-toast.st-success { border-left: 4px solid #198754; }
.st-toast.st-error   { border-left: 4px solid #dc3545; }

.st-toast-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .84rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.st-toast-title {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.st-toast-close {
  background: none;
  border: none;
  font-size: 1rem;
  line-height: 1;
  opacity: .45;
  cursor: pointer;
  padding: 0 2px;
  flex-shrink: 0;
}
.st-toast-close:hover { opacity: 1; }

.st-toast-body {
  font-size: .78rem;
  color: #555;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
  min-height: 1em;
}
.st-toast-body a { color: inherit; text-decoration: underline dotted; }
.st-toast-body a:hover { color: #0d6efd; }

.st-toast-progress {
  height: 4px;
  border-radius: 2px;
  background: #e9ecef;
  overflow: hidden;
}
.st-toast-bar {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.2s linear;
}
.st-pending .st-toast-bar {
  background: #0d6efd;
  animation: st-indeterminate 1.5s infinite ease-in-out;
  width: 55%;
}
.st-success .st-toast-bar { background: #198754; width: 100%; transition: width 0.4s ease; }
.st-error   .st-toast-bar { background: #dc3545; width: 100%; transition: width 0.4s ease; }

@keyframes st-indeterminate {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(620%); }
}
</style>

<script>
(function () {
  'use strict';

  const ACTION_URL = {{ url('/api/questions/create') | tojson }};
  const BASE_URL   = {{ url('/questions') | tojson }};

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const stack = document.getElementById('toast-stack');

  function addToast(label) {
    const el = document.createElement('div');
    el.className = 'st-toast st-pending st-entering';
    el.innerHTML = `
      <div class="st-toast-header">
        <span class="st-icon">⏳</span>
        <span class="st-toast-title">Сохранение вопроса…</span>
        <button class="st-toast-close" title="Закрыть" type="button">&#x2715;</button>
      </div>
      <div class="st-toast-body">${esc(label)}</div>
      <div class="st-toast-progress"><div class="st-toast-bar"></div></div>
    `;
    el.querySelector('.st-toast-close').addEventListener('click', () => dismiss(el));

    stack.prepend(el);

    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('st-entering')));

    return el;
  }

  function resolveToast(el, ok, message, questionId) {
    el.classList.remove('st-pending');
    el.classList.add(ok ? 'st-success' : 'st-error');

    el.querySelector('.st-icon').textContent        = ok ? '✅' : '❌';
    el.querySelector('.st-toast-title').textContent = ok ? 'Вопрос добавлен' : 'Ошибка';

    const body = el.querySelector('.st-toast-body');
    if (ok && questionId) {
      const href = BASE_URL.replace(/\/$/, '') + '/' + questionId;
      body.innerHTML = `<a href="${href}">${esc(message)}</a>`;
    } else {
      body.textContent = message;
    }

    setTimeout(() => dismiss(el), ok ? 7000 : 12000);
  }

  function dismiss(el) {
    if (!el || !el.parentNode) return;
    el.classList.add('st-leaving');
    setTimeout(() => el.remove(), 300);
  }

  const form      = document.getElementById('question-new-form');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const rawText = (document.getElementById('field-text').value || '').trim();
    const label   = rawText.length > 65 ? rawText.slice(0, 65) + '…' : rawText;

    const toastEl = addToast(label);

    submitBtn.disabled = true;
    const origText = submitBtn.textContent;
    submitBtn.textContent = 'Сохранение…';

    const fd = new FormData(form);

    try {
      const resp = await fetch(ACTION_URL, {
        method: 'POST',
        body: fd,
        credentials: 'same-origin',
      });

      let data;
      try { data = await resp.json(); }
      catch (_) { data = { ok: false, error: 'HTTP ' + resp.status + ': неверный ответ сервера' }; }

      if (data.ok) {
        resolveToast(toastEl, true, data.text_preview || label, data.question_id);
        form.reset();
      } else {
        resolveToast(toastEl, false, data.error || 'Неизвестная ошибка', null);
      }
    } catch (err) {
      resolveToast(toastEl, false, 'Сетевая ошибка: ' + err.message, null);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = origText;
    }
  });

})();
</script>
{% endblock %}
