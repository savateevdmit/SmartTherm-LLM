{% extends "base.html" %}
{% block title %}Изменить пароль — SmartTherm — База знаний{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-6">
    <div class="card p-4">
      <div class="mb-3">
        <div class="text-muted small">SmartTherm</div>
        <h1 class="h4 mb-1">Изменить пароль</h1>
        <div class="text-muted small">Пользователь: {{ sess.username }}</div>
      </div>

      <form method="post" action="{{ url('/me/password') }}" class="d-grid gap-3">
        <input type="hidden" name="csrf" value="{{ sess.csrf }}"/>

        <div>
          <label class="form-label">Текущий пароль</label>
          <input class="form-control" type="password" name="current_password" required autocomplete="current-password"/>
        </div>

        <div>
          <label class="form-label">Новый пароль</label>
          <input class="form-control" type="password" name="new_password" minlength="8" required autocomplete="new-password"/>
        </div>

        <div>
          <label class="form-label">Повтор нового пароля</label>
          <input class="form-control" type="password" name="new_password2" minlength="8" required autocomplete="new-password"/>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Сохранить</button>
          <a class="btn btn-outline-secondary" href="{{ url('/questions') }}">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
