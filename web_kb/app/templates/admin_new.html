{% extends "base.html" %}
{% block title %}Новый пользователь — SmartTherm — База знаний{% endblock %}
{% block content %}
<div class="card p-4">
  <div class="d-flex justify-content-between align-items-start gap-3">
    <div>
      <div class="text-muted small">SmartTherm</div>
      <h1 class="h4 mb-1">Добавить пользователя админ‑панели</h1>
      <div class="text-muted small">Доступно только роли <code>admin</code>.</div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url('/admins') }}">Назад</a>
  </div>

  <form method="post" action="{{ url('/admins/new') }}" class="d-grid gap-3 mt-3">
    <input type="hidden" name="csrf" value="{{ sess.csrf }}"/>

    <div>
      <label class="form-label">Логин</label>
      <input name="login" class="form-control" required maxlength="50"/>
    </div>

    <div>
      <label class="form-label">Пароль</label>
      <input name="password" type="password" class="form-control" required minlength="8"/>
    </div>

    <div>
      <label class="form-label">Роль</label>
      <select name="role" class="form-select">
        <option value="operator">Оператор</option>
        <option value="admin">Администратор</option>
      </select>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Создать</button>
      <a class="btn btn-outline-secondary" href="{{ url('/admins') }}">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
